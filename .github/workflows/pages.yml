name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Assemble site (app files only)
        run: |
          mkdir _site
          cp index.html style.css app.js manifest.webmanifest sw.js icon-192.png icon-512.png _site/
          cp -r content _site/
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
